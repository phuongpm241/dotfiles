unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -R
bind-key u select-pane -U
bind-key n select-pane -D
bind-key s command-prompt -p "session name:" "new-session -A -s '%%'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'

# dracula plugins configuration
set -g @dracula-show-powerline true
set -g @dracula-fixed-location "San Francisco"
set -g @dracula-plugins "weather"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g status-position top

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# resize panes — press prefix, then tap H/J/U/N repeatedly (repeatable within repeat-time).
# Must come AFTER tpm: tpm binds prefix+U to "update plugins", so this reclaims U for resize.
bind -r H resize-pane -L 5
bind -r J resize-pane -R 5
bind -r U resize-pane -U 5
bind -r N resize-pane -D 5
